<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UCSF Health — Ambulatory Role Sizing Rubric</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --navy:#052049;
  --navy-2:#0a3370;
  --teal:#18a3ac;
  --teal-2:#1bb8c2;
  --green:#90bd31;
  --blue:#178ccb;
  --orange:#f48024;
  --red:#c8102e;
  --bg:#f5f7fa;
  --white:#fff;
  --border:#dce1e8;
  --text:#1e2840;
  --mid:#5a6a80;
  --light:#8694a8;
  --shadow:0 2px 8px rgba(5,32,73,0.08);
  --shadow-lg:0 8px 32px rgba(5,32,73,0.12);
}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Helvetica Neue",sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.4}

.hero{background:linear-gradient(135deg,var(--navy) 0%,var(--navy-2) 100%);color:#fff;padding:28px 24px;text-align:center;border-bottom:3px solid var(--teal)}
.hero .ey{font-size:11px;letter-spacing:3px;color:var(--teal);text-transform:uppercase;margin-bottom:6px;font-weight:600}
.hero h1{font-size:24px;font-weight:700;letter-spacing:-0.3px}
.hero p{font-size:12px;color:#8ca0bc;margin-top:8px;max-width:720px;margin-left:auto;margin-right:auto}

.container{max-width:1180px;margin:0 auto;padding:24px 20px 60px}

.rubric-intro{background:#fff;border:1px solid var(--border);border-radius:14px;padding:20px 24px;margin-bottom:20px;box-shadow:var(--shadow)}
.rubric-intro h2{font-size:18px;color:var(--navy);font-weight:700;margin-bottom:6px}
.rubric-intro p{font-size:13px;color:var(--mid);line-height:1.55}
.rubric-intro strong{color:var(--navy)}

.cc-selector{background:#fff;border:1px solid var(--border);border-radius:14px;padding:18px 22px;margin-bottom:20px;box-shadow:var(--shadow)}
.cc-selector h3{font-size:11px;color:var(--teal);text-transform:uppercase;letter-spacing:2px;font-weight:700;margin-bottom:12px}
.cc-selector .grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.cc-selector label{display:block;font-size:11px;color:var(--mid);margin-bottom:5px;font-weight:600;text-transform:uppercase;letter-spacing:.5px
